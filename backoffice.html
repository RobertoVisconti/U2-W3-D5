<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Eccomerce Epicode Exams</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/backoffice.css" />
  </head>
  <body>
    <header>
      <nav
        class="navbar navbar-expand-lg bg-dark border-bottom border-body mb-3"
        data-bs-theme="dark"
      >
        <div class="container-fluid">
          <a class="navbar-brand" href="#">Navbar</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Link</a>
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  Dropdown
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">Action</a></li>
                  <li><a class="dropdown-item" href="#">Another action</a></li>
                  <li><hr class="dropdown-divider" /></li>
                  <li>
                    <a class="dropdown-item" href="#">Something else here</a>
                  </li>
                </ul>
              </li>
              <li class="nav-item">
                <a class="nav-link disabled" aria-disabled="true">Disabled</a>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <!-- Section Create Element Ecommerce -->
      <section class="container">
        <div class="row">
          <div class="col">
            <div id="error-container" class="container mt-3"></div>
            <form id="ecommerceForm">
              <div class="mb-3">
                <label for="productName" class="form-label">Product Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="productName"
                  placeholder="Enter product name"
                />
              </div>

              <div class="mb-3">
                <label for="productDescription" class="form-label"
                  >Product description</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="productDescription"
                  placeholder="Enter product description"
                />
              </div>

              <div class="mb-3">
                <label for="productBrand" class="form-label"
                  >Product Brand</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="productBrand"
                  placeholder="Enter product brand"
                />
              </div>

              <div class="mb-3">
                <label for="productImg" class="form-label">Product Image</label>
                <input
                  type="text"
                  class="form-control"
                  id="productImg"
                  placeholder="Enter product image"
                />
              </div>

              <div class="mb-3">
                <label for="productPrice" class="form-label"
                  >Product Price</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="productPrice"
                  placeholder="Enter product price"
                />
              </div>

              <button type="submit" class="btn btn-primary">Save</button>
            </form>
          </div>
        </div>
      </section>
      <!-- Start section Modified or Delete Product -->
      <section class="container my-5">
        <div class="row justify-content-center">
          <div class="col-md-8">
            <h3 class="text-center mb-4">Product Management</h3>
            <ul id="load-product-loaded" class="list-group shadow-sm"></ul>
          </div>
        </div>
      </section>
      <!-- Modal BootStrap -->
      <div
        class="modal fade"
        id="confirmModal"
        tabindex="-1"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Confirm Action</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>

            <div class="modal-body" id="modalBody">Are you sure?</div>

            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                No
              </button>
              <button type="button" class="btn btn-primary" id="confirmBtn">
                Yes, proceed
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="text-light">
      <div class="text-center">
        <p><span id="year"></span> - My Ecommerce</p>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script/backoffice.js"></script>
  </body>
</html>
