<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Eccomerce Epicode Exams</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/backoffice.css" />
  </head>
  <body class="bg-dark min-vh-100 d-flex flex-column">
    <header>
      <nav
        class="navbar navbar-expand-lg bg-dark border-bottom border-body mb-3"
        data-bs-theme="dark"
      >
        <div class="container-fluid">
          <a class="navbar-brand" href="#"
            ><img
              class="img-fluid"
              style="width: 70px"
              src="./assets/logo.png"
              alt="logo"
          /></a>
        </div>
      </nav>
    </header>
    <main class="flex-grow-1">
      <!-- Section Create Element Ecommerce -->
      <section class="container">
        <div class="row">
          <div class="col">
            <div id="error-container" class="container mt-3"></div>
            <h1 class="text-light text-center fw-bold mb-5 changing-back-text">
              Create a product
            </h1>
            <form id="ecommerceForm">
              <div class="mb-3">
                <label
                  for="productName"
                  class="form-label text-light fw-bold changing-back-text"
                  >Product Name</label
                >
                <input
                  type="text"
                  class="form-control changing-back-text"
                  id="productName"
                  placeholder="Enter product name"
                />
              </div>

              <div class="mb-3">
                <label
                  for="productDescription"
                  class="form-label text-light fw-bold changing-back-text"
                  >Product description</label
                >
                <input
                  type="text"
                  class="form-control changing-back-text"
                  id="productDescription"
                  placeholder="Enter product description"
                />
              </div>

              <div class="mb-3">
                <label
                  for="productBrand"
                  class="form-label text-light fw-bold changing-back-text"
                  >Product Brand</label
                >
                <input
                  type="text"
                  class="form-control changing-back-text"
                  id="productBrand"
                  placeholder="Enter product brand"
                />
              </div>

              <div class="mb-3">
                <label
                  for="productImg"
                  class="form-label text-light fw-bold changing-back-text"
                  >Product Image</label
                >
                <input
                  type="text"
                  class="form-control changing-back-text"
                  id="productImg"
                  placeholder="Enter product image"
                />
              </div>

              <div class="mb-3">
                <label
                  for="productPrice"
                  class="form-label text-light fw-bold changing-back-text"
                  >Product Price</label
                >
                <input
                  type="number"
                  class="form-control changing-back-text"
                  id="productPrice"
                  placeholder="Enter product price"
                />
              </div>
              <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-primary">Save</button>
              </div>
            </form>
          </div>
        </div>
      </section>
      <!-- Start section Modified or Delete Product -->
      <section class="container my-5">
        <div class="row justify-content-center">
          <div class="col-md-8">
            <h3 class="text-light text-center mb-4">Product Management</h3>
            <ul
              id="load-product-loaded"
              class="list-group shadow-sm card-changing"
            ></ul>
          </div>
        </div>
      </section>
      <!-- Modal BootStrap -->
      <div
        class="modal fade"
        id="confirmModal"
        tabindex="-1"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Confirm Action</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>

            <div class="modal-body" id="modalBody">Are you sure?</div>

            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                No
              </button>
              <button type="button" class="btn btn-primary" id="confirmBtn">
                Yes, proceed
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="text-light">
      <div class="text-center">
        <p><span id="year"></span> - My Ecommerce</p>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script/backoffice.js"></script>
  </body>
</html>
